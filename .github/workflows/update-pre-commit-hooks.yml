# -----------------------------------------------------------------
# Update Pre-commit Hooks — weekly auto-update of hook versions
#
# Runs on: weekly Sunday at 00:00 UTC, manual dispatch
# Jobs: updates .pre-commit-config.yaml and creates PR
# -----------------------------------------------------------------
name: Update Pre-commit Hooks
run-name: "Update Pre-commit Hooks (${{ github.event_name }})"

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

concurrency:
  group: pre-commit-update
  cancel-in-progress: false

jobs:
  update-hooks:
    name: Update Pre-commit Hooks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Update Hooks
        uses: ./.github/actions/update-pre-commit-composite
        with:
          github_token: ${{ secrets.PRE_COMMIT_PAT }}
