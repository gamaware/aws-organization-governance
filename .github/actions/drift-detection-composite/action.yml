name: 'Drift Detection Composite Action'
description: 'Detects configuration drift and creates GitHub issues'

inputs:
  terraform_version:
    description: 'Terraform version to use'
    required: false
    default: '1.14.5'
  working_directory:
    description: 'Directory containing Terraform configuration'
    required: true
  aws_region:
    description: 'AWS region'
    required: false
    default: 'us-east-1'
  aws_role_arn:
    description: 'AWS IAM role ARN for OIDC authentication'
    required: true
  github_token:
    description: 'GitHub token for creating issues'
    required: true

outputs:
  has_drift:
    description: 'Whether drift was detected'
    value: ${{ steps.check-drift.outputs.has_drift }}

runs:
  using: 'composite'
  steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws_role_arn }}
        aws-region: ${{ inputs.aws_region }}
        role-session-name: GitHubActions-DriftDetection

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform_version }}

    - name: Terraform Init
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: terraform init

    - name: Terraform Plan (Drift Check)
      id: plan
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        set +e
        terraform plan -detailed-exitcode -no-color -out=drift.tfplan | tee plan.txt
        EXIT_CODE=$?
        set -e

        echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

        # Exit codes: 0 = no changes, 1 = error, 2 = changes detected
        if [ $EXIT_CODE -eq 1 ]; then
          exit 1
        fi

    - name: Check for Drift
      id: check-drift
      shell: bash
      run: |
        if [ "${{ steps.plan.outputs.exit_code }}" == "2" ]; then
          echo "has_drift=true" >> $GITHUB_OUTPUT
          echo "⚠️ Configuration drift detected!"
        else
          echo "has_drift=false" >> $GITHUB_OUTPUT
          echo "✅ No drift detected"
        fi

    - name: Create or Update Drift Issue
      if: steps.check-drift.outputs.has_drift == 'true'
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const fs = require('fs');
          const planOutput = fs.readFileSync('${{ inputs.working_directory }}/plan.txt', 'utf-8');

          const issues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: 'drift-detection'
          });

          const driftIssue = issues.data.find(
            i => i.title.includes('Configuration Drift Detected')
          );

          const body = `## ⚠️ Configuration Drift Detected

          **Run:** [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
          **Detected:** ${new Date().toISOString()}
          **Module:** \`${{ inputs.working_directory }}\`

          <details>
          <summary>Drift Details</summary>

          \`\`\`terraform
          ${planOutput.slice(0, 60000)}
          \`\`\`

          </details>

          ### Next Steps
          1. Review drift details above
          2. Create PR to remediate if needed
          3. Close issue once resolved
          `;

          if (driftIssue) {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: driftIssue.number,
              body: `### New Drift Detected\n\n${body}`
            });
          } else {
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Configuration Drift Detected',
              body: body,
              labels: ['drift-detection', 'infrastructure']
            });
          }
