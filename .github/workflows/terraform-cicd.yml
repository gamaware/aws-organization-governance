name: Terraform CI/CD
run-name: >-
  ${{ github.event_name == 'workflow_dispatch'
    && format('Terraform {0}', inputs.action)
    || github.event_name == 'push'
    && format('Terraform plan (push: {0})', github.event.head_commit.message)
    || format('Terraform plan (PR #{0})', github.event.pull_request.number) }}

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-cicd.yml'
      - '.github/actions/terraform-composite/**'
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-cicd.yml'
      - '.github/actions/terraform-composite/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    env:
      TF_VAR_organization_id: ${{ vars.TF_VAR_organization_id }}
      TF_VAR_dev_ou_id: ${{ vars.TF_VAR_dev_ou_id }}
      TF_VAR_aws_region: ${{ vars.TF_VAR_aws_region }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Terraform Plan
        uses: ./.github/actions/terraform-composite
        with:
          terraform_command: plan
          working_directory: terraform/scps
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: ${{ vars.TF_VAR_aws_region }}

      # Infracost - Cost estimation (commented for now)
      # Uncomment and add INFRACOST_API_KEY secret to enable
      # - name: Setup Infracost
      #   uses: infracost/actions/setup@v3
      #   with:
      #     api-key: ${{ secrets.INFRACOST_API_KEY }}

      # - name: Generate Infracost JSON
      #   run: |
      #     cd terraform/scps
      #     infracost breakdown --path . \
      #       --format json \
      #       --out-file /tmp/infracost.json

      # - name: Post Infracost Comment
      #   if: github.event_name == 'pull_request'
      #   uses: infracost/actions/comment@v3
      #   with:
      #     path: /tmp/infracost.json
      #     behavior: update

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'apply'
    env:
      TF_VAR_organization_id: ${{ vars.TF_VAR_organization_id }}
      TF_VAR_dev_ou_id: ${{ vars.TF_VAR_dev_ou_id }}
      TF_VAR_aws_region: ${{ vars.TF_VAR_aws_region }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Terraform Apply
        uses: ./.github/actions/terraform-composite
        with:
          terraform_command: apply
          working_directory: terraform/scps
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: ${{ vars.TF_VAR_aws_region }}

      - name: Post-Deployment Validation
        uses: ./.github/actions/post-deploy-validation-composite
        with:
          working_directory: terraform/scps
          aws_region: ${{ vars.TF_VAR_aws_region }}
          expected_org_id: ${{ vars.TF_VAR_organization_id }}
          expected_dev_ou: ${{ vars.TF_VAR_dev_ou_id }}

  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
    env:
      TF_VAR_organization_id: ${{ vars.TF_VAR_organization_id }}
      TF_VAR_dev_ou_id: ${{ vars.TF_VAR_dev_ou_id }}
      TF_VAR_aws_region: ${{ vars.TF_VAR_aws_region }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Terraform Destroy
        uses: ./.github/actions/terraform-composite
        with:
          terraform_command: destroy
          working_directory: terraform/scps
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: ${{ vars.TF_VAR_aws_region }}
