name: Terraform PR Checks

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-pr.yml'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  lint-and-security:
    name: Lint and Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.5

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: TFLint Setup
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: Run TFLint
        run: |
          tflint --init
          tflint --recursive
        working-directory: terraform

      - name: Checkov Security Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          soft_fail: false

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: lint-and-security
    env:
      TF_VAR_organization_id: ${{ vars.TF_VAR_organization_id }}
      TF_VAR_dev_ou_id: ${{ vars.TF_VAR_dev_ou_id }}
      TF_VAR_aws_region: ${{ vars.TF_VAR_aws_region }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Terraform Plan
        uses: ./.github/actions/terraform-composite
        with:
          terraform_command: plan
          working_directory: terraform/scps
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: ${{ vars.TF_VAR_aws_region }}
