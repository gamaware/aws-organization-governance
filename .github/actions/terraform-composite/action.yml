name: 'Terraform Composite Action'
description: 'Reusable composite action for Terraform operations'

inputs:
  terraform_version:
    description: 'Terraform version to use'
    required: false
    default: '1.14.5'
  working_directory:
    description: 'Directory containing Terraform configuration'
    required: true
  terraform_command:
    description: 'Terraform command to run (init, plan, apply)'
    required: true
  aws_region:
    description: 'AWS region'
    required: false
    default: 'us-east-1'
  aws_role_arn:
    description: 'AWS IAM role ARN for OIDC authentication'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws_role_arn }}
        aws-region: ${{ inputs.aws_region }}
        role-session-name: GitHubActions-${{ github.workflow_ref && 'Terraform' || 'Terraform' }}-${{ github.run_id }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform_version }}

    - name: Cache Terraform providers
      uses: actions/cache@v4
      with:
        path: ${{ inputs.working_directory }}/.terraform/providers
        key: terraform-providers-${{ runner.os }}-${{ hashFiles(format('{0}/.terraform.lock.hcl', inputs.working_directory)) }}
        restore-keys: |
          terraform-providers-${{ runner.os }}-

    - name: Terraform Init
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: terraform init

    - name: Terraform Format Check
      if: inputs.terraform_command == 'plan'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: terraform fmt -check -recursive

    - name: Terraform Validate
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: terraform validate

    - name: Terraform Plan
      if: inputs.terraform_command == 'plan'
      id: plan
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: ${{ github.workspace }}/.github/scripts/terraform-plan.sh

    - name: Upload Plan Artifact
      if: inputs.terraform_command == 'plan'
      uses: actions/upload-artifact@v4
      with:
        name: terraform-plan
        path: |
          ${{ inputs.working_directory }}/tfplan
          ${{ inputs.working_directory }}/plan.txt
        retention-days: 1

    - name: Comment Plan on PR
      if: inputs.terraform_command == 'plan' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const planPath = '${{ inputs.working_directory }}/plan.txt';
          let planOutput = '';
          try {
            planOutput = fs.readFileSync(planPath, 'utf8');
          } catch (e) {
            planOutput = 'Plan output not available.';
          }

          // Truncate if too long (GitHub comment limit is 65536 chars)
          const maxLen = 60000;
          if (planOutput.length > maxLen) {
            planOutput = planOutput.substring(0, maxLen) + '\n\n... (truncated)';
          }

          const body = `### Terraform Plan Output

          <details>
          <summary>Click to expand plan</summary>

          \`\`\`terraform
          ${planOutput}
          \`\`\`

          </details>

          *Workflow: \`${{ github.workflow }}\` | Run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*`;

          // Find and update existing comment or create new one
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const botComment = comments.find(c =>
            c.body.includes('### Terraform Plan Output')
          );

          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Download Plan Artifact
      if: inputs.terraform_command == 'apply'
      uses: actions/download-artifact@v4
      with:
        name: terraform-plan
        path: ${{ inputs.working_directory }}

    - name: Terraform Apply
      if: inputs.terraform_command == 'apply'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: terraform apply -auto-approve tfplan

    - name: Terraform Destroy
      if: inputs.terraform_command == 'destroy'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: terraform destroy -auto-approve
