name: Terraform CI/CD
run-name: >-
  ${{ github.event_name == 'workflow_dispatch'
    && format('Terraform {0}', inputs.action)
    || format('Terraform plan → apply (push: {0})', github.event.head_commit.message) }}

on:
  push:
    branches: [main]
    paths:
      - 'terraform/scps/**'
      - '.github/workflows/terraform-cicd.yml'
      - '.github/actions/terraform-composite/**'
      - '.github/actions/quality-gate-composite/**'
      - '.github/scripts/**'
      - 'tests/scps_test.go'
      - 'tests/helpers_test.go'
      - 'tests/go.mod'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - apply
          - destroy
        default: apply

concurrency:
  group: terraform-state
  cancel-in-progress: false

jobs:
  quality-gate:
    name: Quality and Security Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push'
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Quality Gate
        uses: ./.github/actions/quality-gate-composite
        with:
          github_token: ${{ github.token }}

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality-gate
    if: always() && (needs.quality-gate.result == 'success' || github.event_name == 'workflow_dispatch')
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    env:
      TF_VAR_dev_ou_id: ${{ vars.TF_VAR_dev_ou_id }}
      TF_VAR_aws_region: ${{ vars.TF_VAR_aws_region }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Terraform Plan
        uses: ./.github/actions/terraform-composite
        with:
          terraform_command: plan
          working_directory: terraform/scps
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: ${{ vars.TF_VAR_aws_region }}

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: terraform-plan
    environment: production
    permissions:
      id-token: write
      contents: read
    env:
      TF_VAR_dev_ou_id: ${{ vars.TF_VAR_dev_ou_id }}
      TF_VAR_aws_region: ${{ vars.TF_VAR_aws_region }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Terraform Apply
        uses: ./.github/actions/terraform-composite
        with:
          terraform_command: apply
          working_directory: terraform/scps
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: ${{ vars.TF_VAR_aws_region }}

      - name: Post-Deployment Validation
        id: validation
        uses: ./.github/actions/post-deploy-validation-composite
        with:
          working_directory: terraform/scps
          aws_region: ${{ vars.TF_VAR_aws_region }}
          expected_org_id: ${{ vars.EXPECTED_ORG_ID }}
          expected_dev_ou: ${{ vars.TF_VAR_dev_ou_id }}

      - name: AI Deployment Analysis
        continue-on-error: true
        env:
          WORKING_DIRECTORY: terraform/scps
          VALIDATION_LOG: ${{ steps.validation.outputs.validation_log }}
          BEDROCK_MODEL_ID: us.anthropic.claude-sonnet-4-6
        run: ${{ github.workspace }}/.github/scripts/ai-deployment-analysis.sh

      - name: Upload AI Analysis
        if: always() && hashFiles('terraform/scps/ai-analysis.md') != ''
        uses: actions/upload-artifact@v7
        with:
          name: ai-deployment-analysis
          path: terraform/scps/ai-analysis.md
          retention-days: 30

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: tests/go.sum

      - name: Run Integration Tests (SCPs)
        working-directory: tests
        env:
          AWS_REGION: ${{ vars.TF_VAR_aws_region }}
          TF_WORKING_DIR: ${{ github.workspace }}/terraform/scps
          TF_VAR_dev_ou_id: ${{ vars.TF_VAR_dev_ou_id }}
        run: go test -v -timeout 5m -run TestSCPs ./...

  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
    environment: production
    permissions:
      id-token: write
      contents: read
    env:
      TF_VAR_dev_ou_id: ${{ vars.TF_VAR_dev_ou_id }}
      TF_VAR_aws_region: ${{ vars.TF_VAR_aws_region }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Terraform Destroy
        uses: ./.github/actions/terraform-composite
        with:
          terraform_command: destroy
          working_directory: terraform/scps
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: ${{ vars.TF_VAR_aws_region }}

      - name: Post-Destroy Validation
        env:
          EXPECTED_ORG_ID: ${{ vars.EXPECTED_ORG_ID }}
          EXPECTED_DEV_OU: ${{ vars.TF_VAR_dev_ou_id }}
        run: ${{ github.workspace }}/.github/scripts/validate-destroy.sh
