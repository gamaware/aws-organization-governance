name: Terraform CI/CD

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-cicd.yml'
      - '.github/actions/terraform-composite/**'
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-cicd.yml'
      - '.github/actions/terraform-composite/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    env:
      TF_VAR_organization_id: ${{ vars.TF_VAR_organization_id }}
      TF_VAR_dev_ou_id: ${{ vars.TF_VAR_dev_ou_id }}
      TF_VAR_aws_region: ${{ vars.TF_VAR_aws_region }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Terraform Plan
        uses: ./.github/actions/terraform-composite
        with:
          terraform_command: plan
          working_directory: terraform/scps
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: us-east-1

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      TF_VAR_organization_id: ${{ vars.TF_VAR_organization_id }}
      TF_VAR_dev_ou_id: ${{ vars.TF_VAR_dev_ou_id }}
      TF_VAR_aws_region: ${{ vars.TF_VAR_aws_region }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Terraform Apply
        uses: ./.github/actions/terraform-composite
        with:
          terraform_command: apply
          working_directory: terraform/scps
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: us-east-1
