language: en-US
reviews:
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: "terraform/**"
      instructions: >
        Review for Terraform best practices, security misconfigurations,
        and AWS Organizations SCP policy correctness.
    - path: "terraform/cleanup/**"
      instructions: >
        Review for Terraform best practices, IAM least-privilege in iam.tf,
        Step Functions and Lambda configuration correctness, and secure
        aws-nuke config template handling in nuke-config.yaml.tpl.
    - path: ".github/workflows/**"
      instructions: >
        Review for GitHub Actions security best practices, pinned action
        versions, and least-privilege permissions.
    - path: ".github/scripts/**"
      instructions: >
        Review for shell scripting best practices, proper error handling,
        and shellcheck/shellharden compliance.
    - path: "CLAUDE.md"
      instructions: >
        Verify project instructions match the actual repository structure,
        naming conventions, and tooling configuration.
  path_filters:
    - "!**/*.tfvars"
    - "!**/.terraform.lock.hcl"
chat:
  auto_reply: true
