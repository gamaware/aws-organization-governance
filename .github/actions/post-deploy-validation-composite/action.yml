name: 'Post-Deployment Validation Composite Action'
description: 'Validates deployed infrastructure matches expected state'

inputs:
  working_directory:
    description: 'Directory containing Terraform configuration'
    required: true
  aws_region:
    description: 'AWS region'
    required: false
    default: 'us-east-1'
  expected_org_id:
    description: 'Expected organization ID'
    required: true
  expected_dev_ou:
    description: 'Expected Dev OU ID'
    required: true

outputs:
  validation_log:
    description: 'Validation script output for downstream steps'
    value: ${{ steps.validate.outputs.validation_log }}

runs:
  using: 'composite'
  steps:
    - name: Get Terraform Outputs
      id: outputs
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: ${{ github.workspace }}/.github/scripts/get-terraform-outputs.sh

    - name: Validate Deployment
      id: validate
      shell: bash
      env:
        ORG_ID: ${{ steps.outputs.outputs.org_id }}
        EXPECTED_ORG_ID: ${{ inputs.expected_org_id }}
        ROOT_ID: ${{ steps.outputs.outputs.root_id }}
        EXPECTED_DEV_OU: ${{ inputs.expected_dev_ou }}
        DEV_SCP_ID: ${{ steps.outputs.outputs.dev_scp_id }}
        DEV_SCP_ARN: ${{ steps.outputs.outputs.dev_scp_arn }}
        SSO_SCP_ID: ${{ steps.outputs.outputs.sso_scp_id }}
        SSO_SCP_ARN: ${{ steps.outputs.outputs.sso_scp_arn }}
        DEV_TAGGING_SCP_ID: ${{ steps.outputs.outputs.dev_tagging_scp_id }}
        DEV_TAGGING_SCP_ARN: ${{ steps.outputs.outputs.dev_tagging_scp_arn }}
        REGION_SCP_ID: ${{ steps.outputs.outputs.region_scp_id }}
        REGION_SCP_ARN: ${{ steps.outputs.outputs.region_scp_arn }}
        SECURITY_DEFAULTS_SCP_ID: ${{ steps.outputs.outputs.security_defaults_scp_id }}
        SECURITY_DEFAULTS_SCP_ARN: ${{ steps.outputs.outputs.security_defaults_scp_arn }}
      run: |
        set +e
        LOG_FILE="$(mktemp)"
        ${{ github.workspace }}/.github/scripts/validate-deployment.sh 2>&1 | tee "$LOG_FILE" >&2
        VALIDATE_EXIT="${PIPESTATUS[0]}"
        set -e

        MAX_CHARS=60000
        if [ "$(wc -c < "$LOG_FILE")" -gt "$MAX_CHARS" ]; then
          head -c "$MAX_CHARS" "$LOG_FILE" > "${LOG_FILE}.trunc"
          printf '\n[...validation log truncated to %s chars...]\n' "$MAX_CHARS" >> "${LOG_FILE}.trunc"
          mv "${LOG_FILE}.trunc" "$LOG_FILE"
        fi

        DELIM="VALIDATION_EOF_${RANDOM}_$(date +%s)"
        {
          echo "validation_log<<$DELIM"
          cat "$LOG_FILE"
          echo "$DELIM"
        } >> "$GITHUB_OUTPUT"

        rm -f "$LOG_FILE"
        exit "$VALIDATE_EXIT"
