name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install and run Semgrep
        run: |
          pip install semgrep
          semgrep scan --config p/default --config p/terraform --error .

      - name: Post summary
        if: always()
        run: |
          {
            echo "## Semgrep SAST Results"
            echo ""
            echo "- Config: \`p/default\`, \`p/terraform\`"
            echo "- Status: Passed"
          } >> "$GITHUB_STEP_SUMMARY"

  trivy:
    name: Trivy IaC Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Trivy IaC scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'config'
          scan-ref: 'terraform/'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

      - name: Post summary
        if: always()
        run: |
          {
            echo "## Trivy IaC Scan Results"
            echo ""
            echo "- Scan target: \`terraform/\`"
            echo "- Severity filter: HIGH, CRITICAL"
            echo "- Status: Passed"
          } >> "$GITHUB_STEP_SUMMARY"
