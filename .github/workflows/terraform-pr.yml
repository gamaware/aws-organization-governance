# -----------------------------------------------------------------
# Terraform PR Checks — validates Terraform changes before merge
#
# Runs on: PRs to main that touch terraform/ or workflow files
# Jobs: lint + security (TFLint, Checkov), terraform test (mocked),
#       terraform plan (posted as PR comment)
# Gate: blocks merge if any job fails
# -----------------------------------------------------------------
name: Terraform PR Checks
run-name: >-
  Terraform PR checks (PR #${{ github.event.pull_request.number }})

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-pr.yml'
      - '.github/actions/lint-and-security-composite/**'
      - '.github/actions/terraform-composite/**'
      - '.github/scripts/**'

concurrency:
  group: terraform-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint-and-security:
    name: Lint and Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Lint and Security
        uses: ./.github/actions/lint-and-security-composite
        with:
          working_directory: terraform/scps

  terraform-test:
    name: Terraform Test (${{ matrix.module }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        module: [scps, cleanup]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.5"
          terraform_wrapper: false

      - name: Override Backend
        working-directory: terraform/${{ matrix.module }}
        shell: bash
        run: printf 'terraform {\n  backend "local" {}\n}\n' > backend_override.tf

      - name: Terraform Init
        working-directory: terraform/${{ matrix.module }}
        run: terraform init

      - name: Run Terraform Tests
        working-directory: terraform/${{ matrix.module }}
        shell: bash
        run: |
          set +eo pipefail
          terraform test -verbose 2>&1 | tee test-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -eo pipefail
          {
            echo "### Terraform Test: ${{ matrix.module }}"
            echo '```'
            tail -20 test-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$EXIT_CODE"

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-and-security, terraform-test]
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    env:
      TF_VAR_dev_ou_id: ${{ vars.TF_VAR_dev_ou_id }}
      TF_VAR_aws_region: ${{ vars.TF_VAR_aws_region }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Terraform Plan
        uses: ./.github/actions/terraform-composite
        with:
          terraform_command: plan
          working_directory: terraform/scps
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
          aws_region: ${{ vars.TF_VAR_aws_region }}
