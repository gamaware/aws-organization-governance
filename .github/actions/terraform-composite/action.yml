name: 'Terraform Composite Action'
description: 'Reusable composite action for Terraform operations'

inputs:
  terraform_version:
    description: 'Terraform version to use'
    required: false
    default: '1.14.5'
  working_directory:
    description: 'Directory containing Terraform configuration'
    required: true
  terraform_command:
    description: 'Terraform command to run (init, plan, apply)'
    required: true
  aws_region:
    description: 'AWS region'
    required: false
    default: 'us-east-1'
  aws_role_arn:
    description: 'AWS IAM role ARN for OIDC authentication'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws_role_arn }}
        aws-region: ${{ inputs.aws_region }}
        role-session-name: GitHubActions-Terraform

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform_version }}

    - name: Terraform Init
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: terraform init

    - name: Terraform Format Check
      if: inputs.terraform_command == 'plan'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: terraform fmt -check -recursive

    - name: Terraform Validate
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: terraform validate

    - name: Terraform Plan
      if: inputs.terraform_command == 'plan'
      id: plan
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        set +e
        terraform plan -detailed-exitcode -out=tfplan | tee plan.txt
        EXIT_CODE=$?
        set -e

        echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

        echo "## Terraform Plan Summary" >> $GITHUB_STEP_SUMMARY
        echo '```terraform' >> $GITHUB_STEP_SUMMARY
        grep -A 100 "Terraform will perform" plan.txt >> $GITHUB_STEP_SUMMARY || echo "No changes detected" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

        # Exit codes: 0 = no changes, 1 = error, 2 = changes detected
        if [ $EXIT_CODE -eq 1 ]; then
          exit 1
        fi

    - name: Upload Plan Artifact
      if: inputs.terraform_command == 'plan'
      uses: actions/upload-artifact@v4
      with:
        name: terraform-plan
        path: |
          ${{ inputs.working_directory }}/tfplan
          ${{ inputs.working_directory }}/plan.txt
        retention-days: 1

    - name: Download Plan Artifact
      if: inputs.terraform_command == 'apply'
      uses: actions/download-artifact@v4
      with:
        name: terraform-plan
        path: ${{ inputs.working_directory }}

    - name: Terraform Apply
      if: inputs.terraform_command == 'apply'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: terraform apply -auto-approve tfplan

    - name: Terraform Destroy
      if: inputs.terraform_command == 'destroy'
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: terraform destroy -auto-approve
